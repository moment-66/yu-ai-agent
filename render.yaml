# ====== Render Blueprint ======
# Render 会从 GitHub 自动读取此文件，一键部署所有服务
# 文档：https://render.com/docs/blueprint-spec

services:
  # ========== 后端 Spring Boot ==========
  - type: web
    name: yu-ai-agent-backend
    runtime: docker
    repo: https://github.com/moment-66/yu-ai-agent
    branch: master
    rootDir: .
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DASHSCOPE_API_KEY
        sync: false  # 在 Render 后台手动填写（安全）
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JAVA_OPTS
        value: "-Xmx256m"

  # ========== 前端 Vue.js ==========
  - type: static
    name: yu-ai-agent-frontend
    repo: https://github.com/moment-66/yu-ai-agent
    branch: master
    rootDir: xiaochen-ai-agent-frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    plan: free
    routes:
      # Vue Router History 模式：所有路径重写到 index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # 部署后填入后端实际地址（如 https://yu-ai-agent-backend.onrender.com/api）
      - key: VITE_API_BASE_URL
        sync: false
