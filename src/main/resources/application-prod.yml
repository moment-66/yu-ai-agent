# application-prod.yml —— 生产环境配置
spring:
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:yu_ai_agent}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

server:
  port: 8123

# 生产环境关闭调试日志
logging:
  level:
    org.springframework.ai: INFO
